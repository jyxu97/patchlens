spring.application.name=backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/patchlens
spring.datasource.username=patchlens
spring.datasource.password=patchlens
# Let Hibernate auto-create/update tables based on entity definitions
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# GitHub (optional: increases rate limit from 60 to 5000 requests/hour)
github.token=

# OpenAI
openai.api-key=
openai.model=gpt-4o-mini

# AI mode: "mock" (no API calls) or "openai" (real API calls)
ai.mode=mock

# Prompt versioning — bump version_tag when the system prompt or model changes
prompt.version=v1
prompt.notes=Initial version with gpt-4o-mini

# Cost controls
max.changed.files=20
max.patch.chars.per.file=4000

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=patchlens
spring.rabbitmq.password=patchlens

# GitHub Webhook
github.webhook.secret=

# SSE: disable MVC global async timeout; rely on SseEmitter timeout (300s)
spring.mvc.async.request-timeout=-1
