name: Backend CI

# Run when backend code changes on push or pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'         # caches ~/.m2 between runs for faster builds

      # Run only pure unit tests (no Spring context, no external services needed)
      - name: Run unit tests
        run: ./mvnw test -Dtest="GitHubPrUrlParserTest,DiffParserServiceTest,RiskScoringServiceTest,SamplePrLoaderTest,CacheServiceTest,OpenAIServiceTest" -DfailIfNoTests=false
        working-directory: backend

  deploy:
    needs: test                        # only runs if test job passes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
